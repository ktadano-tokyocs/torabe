<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; padding: 20px; }
  h4 { font-size: 10px; font-weight: 700; color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-wrap { flex: 1; height: 18px; background: #F3F4F6; border-radius: 4px; overflow: hidden; }
  .bar { height: 100%; background: #0B9B88; border-radius: 4px; opacity: 0.7; }
  .meta { width: 120px; font-size: 10px; font-family: monospace; color: #6B7280; }
  .val { width: 60px; font-size: 10px; color: #333; font-weight: 700; }
  .divider { border: none; border-top: 1px solid #E5E7EB; margin: 14px 0; }
  .radius-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .radius-item { background: white; border: 2px solid #0B9B88; width: 52px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .rlabel { font-size: 9px; color: #374151; font-weight: 700; }
</style>
</head>
<body>
  <h4>Spacing Scale</h4>
  <div class="row"><div class="meta">--space-1</div><div class="val">4px</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div></div>
  <div class="row"><div class="meta">--space-2</div><div class="val">8px</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div></div>
  <div class="row"><div class="meta">--space-3</div><div class="val">12px</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div></div>
  <div class="row"><div class="meta">--space-4</div><div class="val">16px</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div></div>
  <div class="row"><div class="meta">--space-6</div><div class="val">24px</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div></div>
  <div class="row"><div class="meta">--space-8</div><div class="val">32px</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div></div>
  <div class="row"><div class="meta">--space-10</div><div class="val">40px</div><div class="bar-wrap"><div class="bar" style="width:40px"></div></div></div>
  <div class="row"><div class="meta">--space-12</div><div class="val">48px</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div></div>
  <div class="row"><div class="meta">--space-16</div><div class="val">64px</div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div></div>
  <hr class="divider">
  <h4>Border Radius</h4>
  <div class="radius-row">
    <div style="text-align:center"><div class="radius-item" style="border-radius:4px"></div><div class="rlabel">sm 4px</div></div>
    <div style="text-align:center"><div class="radius-item" style="border-radius:8px"></div><div class="rlabel">md 8px</div></div>
    <div style="text-align:center"><div class="radius-item" style="border-radius:12px"></div><div class="rlabel">lg 12px</div></div>
    <div style="text-align:center"><div class="radius-item" style="border-radius:16px"></div><div class="rlabel">xl 16px</div></div>
    <div style="text-align:center"><div class="radius-item" style="border-radius:24px"></div><div class="rlabel">2xl 24px</div></div>
    <div style="text-align:center"><div class="radius-item" style="border-radius:9999px"></div><div class="rlabel">full</div></div>
  </div>
</body></html>
