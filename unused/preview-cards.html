<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    @font-face {
      font-family: 'Material Icons Outlined';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url(https://fonts.gstatic.com/s/materialiconsoutlined/v109/gok-H7zzDkdnRel8-DQ6KAXJ69wP1tGnf4ZGhUce.woff2) format('woff2');
    }
    .material-icons-outlined {
      font-family: 'Material Icons Outlined';
      font-weight: normal; font-style: normal; font-size: 24px; line-height: 1;
      letter-spacing: normal; text-transform: none; display: inline-block;
      white-space: nowrap; word-wrap: normal; direction: ltr;
      -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }
  </style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; padding: 16px; }
  .row { display: flex; gap: 12px; }
  .card { border-radius: 16px; padding: 16px; flex: 1; border: 1px solid #E5E7EB; }
  .card-white { background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .card-tint  { background: #E6F5F2; border-color: rgba(11,155,136,0.2); }
  .card-yellow{ background: #FFF9E6; border-color: rgba(253,184,19,0.25); }
  .card-dark  { background: #0B9B88; border-color: transparent; }
  .icon-wrap { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .title { font-size: 13px; font-weight: 700; color: #1F2937; margin-bottom: 4px; }
  .title-white { color: white; }
  .body { font-size: 11px; color: #6B7280; line-height: 1.6; }
  .body-white { color: rgba(255,255,255,0.8); }
  .quote { border-left: 2px solid rgba(11,155,136,0.35); padding-left: 8px; font-size: 11px; font-style: italic; color: #0a7c6d; line-height: 1.5; margin-top: 8px; }
  h4 { font-size: 9px; font-weight: 700; color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>
  <h4>Card Variants</h4>
  <div class="row">
    <div class="card card-white">
      <div class="icon-wrap" style="background:#E6F5F2">
        <span class="material-icons-outlined" style="color:#0B9B88;font-size:18px">menu_book</span>
      </div>
      <div class="title">日本語</div>
      <div class="body">「表現する力」を一生の武器に。読む・ことば・書くの三本柱。</div>
    </div>
    <div class="card card-tint">
      <div class="icon-wrap" style="background:rgba(11,155,136,0.15)">
        <span class="material-icons-outlined" style="color:#0B9B88;font-size:18px">explore</span>
      </div>
      <div class="title">探究</div>
      <div class="body">「なぜ？」を追いかける力が育つ。マイプロジェクトで自分の問いを深める。</div>
    </div>
    <div class="card card-yellow">
      <div class="icon-wrap" style="background:rgba(253,184,19,0.2)">
        <span class="material-icons-outlined" style="color:#d97706;font-size:18px">forest</span>
      </div>
      <div class="title">原体験</div>
      <div class="body">畑・川遊び・登山・乗馬など本物の体験が自信をつくる。</div>
    </div>
    <div class="card card-dark">
      <div class="icon-wrap" style="background:rgba(255,255,255,0.15)">
        <span class="material-icons-outlined" style="color:white;font-size:18px">trending_up</span>
      </div>
      <div class="title title-white">個別評価</div>
      <div class="body body-white">成績でなく「成長」で見守る。学期ごとの個別評価レポート。</div>
    </div>
  </div>
  <div style="margin-top:10px">
    <div class="card card-white" style="padding:12px 14px">
      <div class="title" style="margin-bottom:6px">スタッフ引用カード</div>
      <div class="quote">「子どもたちが自分らしく学べる場所を、20年かけてつくってきました。ここでの出会いが、きっとお子さんの力になると信じています。」</div>
      <div style="font-size:10px;color:#9CA3AF;margin-top:6px">— 永易 江麻, Director</div>
    </div>
  </div>
</body></html>
