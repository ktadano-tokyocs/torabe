<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; padding: 20px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .card { background: white; border-radius: 12px; width: 110px; height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .lbl { font-size: 10px; font-weight: 700; color: #374151; margin-top: 6px; }
  .sub { font-size: 9px; color: #9CA3AF; margin-top: 2px; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="card" style="box-shadow:0 1px 2px 0 rgba(0,0,0,0.05)"></div><div class="lbl">shadow-sm</div><div class="sub">default card</div></div>
    <div class="item"><div class="card" style="box-shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1)"></div><div class="lbl">shadow-md</div><div class="sub">on hover</div></div>
    <div class="item"><div class="card" style="box-shadow:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1)"></div><div class="lbl">shadow-lg</div><div class="sub">CTA button</div></div>
    <div class="item"><div class="card" style="box-shadow:0 4px 14px rgba(11,155,136,0.25)"></div><div class="lbl">primary glow</div><div class="sub">btn-primary</div></div>
    <div class="item"><div class="card" style="box-shadow:0 4px 14px rgba(253,184,19,0.35)"></div><div class="lbl">secondary glow</div><div class="sub">btn-secondary</div></div>
  </div>
</body></html>
