<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とらすとベース フリースクール — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Material Icons Outlined';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url(https://fonts.gstatic.com/s/materialiconsoutlined/v109/gok-H7zzDkdnRel8-DQ6KAXJ69wP1tGnf4ZGhUce.woff2) format('woff2');
    }
    .material-icons-outlined {
      font-family: 'Material Icons Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; color: #333; -webkit-font-smoothing: antialiased; }
    h2, h3, h4 { word-break: keep-all; overflow-wrap: break-word; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.4); border-radius: 20px; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulseBorder {
      0%, 100% { box-shadow: 0 0 0 0 rgba(253,184,19,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(253,184,19,0); }
    }
    /* Mobile-responsive grid overrides */
    @media (max-width: 640px) {
      .features-grid { grid-template-columns: 1fr !important; }
      .staff-grid   { grid-template-columns: 1fr !important; }
      .menu-grid    { grid-template-columns: repeat(2,1fr) !important; }
      .hero-title   { font-size: 36px !important; }
      .desktop-nav  { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }
    @media (min-width: 641px) {
      .mobile-nav { display: none !important; }
      .mobile-menu-btn { display: none !important; }
    }
    /* Section separator for features / staff responsive */
    .features-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .staff-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load components in order -->
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Concept.jsx"></script>
  <script type="text/babel" src="Features.jsx"></script>
  <script type="text/babel" src="Staff.jsx"></script>
  <script type="text/babel" src="CTASection.jsx"></script>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    // ── Schedule section (inline — simple enough) ────────────────────
    const Schedule = () => {
      const steps = [
        { time: '8:30',  dot: '#FDB813', title: 'オープン', desc: null },
        { time: '9:00',  dot: '#0B9B88', title: '朝の会・日本語 + α メニュー', desc: '基礎となる日本語の学びや、それぞれの課題に取り組みます。' },
        { time: '12:00', dot: '#0B9B88', title: 'ランチ・かんがえたい（探究）', desc: 'みんなで昼食をとった後、探究活動やマイプロジェクトを進めます。' },
        { time: '15:45', dot: '#0B9B88', title: '振り返り・そうじ', desc: '一日の学びを振り返り、使った場所を綺麗にします。' },
        { time: '17:00', dot: '#9CA3AF', title: 'クローズ', desc: null },
      ];

      return (
        <section id="schedule" style={{ padding: '60px 24px', background: 'white' }}>
          <div style={{ maxWidth: 1000, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 40 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#0B9B88', marginBottom: 8 }}>Environment & Schedule</div>
              <h2 style={{ fontSize: 24, fontWeight: 700, color: '#1F2937' }}>学習環境と一日の過ごし方</h2>
            </div>
            <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
              {/* House photo */}
              <div style={{ flex: '1 1 300px' }}>
                <div style={{ borderRadius: 16, overflow: 'hidden', aspectRatio: '16/9', marginBottom: 16, boxShadow: '0 4px 12px rgba(0,0,0,0.1)', position: 'relative' }}>
                  <img src="../../assets/torabe-house.webp" alt="とらすとベース 外観"
                    style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                </div>
                <h3 style={{ fontSize: 17, fontWeight: 700, color: '#1F2937', marginBottom: 8 }}>安心して学べるアットホームな一軒家</h3>
                <p style={{ fontSize: 13, color: '#6B7280', lineHeight: 1.8, marginBottom: 16 }}>
                  スタッフが組み立てる時間の他、子どもが自分で選ぶ<span style={{ color: '#0B9B88', fontWeight: 700 }}>「余白」</span>の時間がたっぷりあります。
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 8 }}>
                  {[['tv','スマートボード'],['laptop_mac','iPad / MacBook'],['build','工作スペース'],['deck','屋上エリア']].map(([icon,label]) => (
                    <div key={label} style={{ background: 'white', border: '1px solid #E5E7EB', borderRadius: 12, padding: '10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                      <span className="material-icons-outlined" style={{ color: '#FDB813', fontSize: 22, display: 'block', marginBottom: 4 }}>{icon}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, color: '#374151' }}>{label}</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Timeline */}
              <div style={{ flex: '1 1 280px', background: 'white', borderRadius: 24, padding: '28px 24px', border: '1px solid #E5E7EB', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 24, color: '#0B9B88', fontWeight: 700, fontSize: 14 }}>
                  <span className="material-icons-outlined" style={{ fontSize: 20 }}>schedule</span>
                  一日のスケジュール例
                </div>
                <div style={{ position: 'relative', paddingLeft: 24 }}>
                  <div style={{ position: 'absolute', left: 8, top: 8, bottom: 8, width: 2, background: '#E5E7EB' }} />
                  {steps.map((s, i) => (
                    <div key={s.time} style={{ position: 'relative', marginBottom: i < steps.length - 1 ? 24 : 0 }}>
                      <div style={{ position: 'absolute', left: -20, top: 4, width: 14, height: 14, borderRadius: '50%', background: s.dot, border: '2px solid white', zIndex: 1 }} />
                      <div style={{ fontSize: 17, fontWeight: 700, color: '#1F2937', marginBottom: 2 }}>{s.time}</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: '#374151' }}>{s.title}</div>
                      {s.desc && <p style={{ fontSize: 11, color: '#6B7280', marginTop: 3, lineHeight: 1.6 }}>{s.desc}</p>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    // ── Empathy section ───────────────────────────────────────────────
    const Empathy = ({ onNav }) => {
      const items = [
        { icon: 'class', bg: '#FEF2F2', color: '#F87171', text: '「学校の授業が一律すぎて、うちの子には合っていない気がする」' },
        { icon: 'directions_run', bg: '#EFF6FF', color: '#60A5FA', text: '「決まった科目・時間割より、もっと自由に学ばせてあげたい」' },
        { icon: 'home', bg: '#FFFBEB', color: '#FBBF24', text: '「少人数で、一人ひとりと向き合ってくれる場所を探している」' },
        { icon: 'sentiment_dissatisfied', bg: '#FFF7ED', color: '#FB923C', text: '「学校に行き渋っている。でも家にいるだけでは不安…」' },
      ];
      return (
        <section style={{ padding: '60px 24px', background: '#F9FAFB' }}>
          <div style={{ maxWidth: 900, margin: '0 auto' }}>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: '#0B9B88', textAlign: 'center', marginBottom: 28 }}>
              お子様の学びについて、こんな想いはありませんか？
            </h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 12, marginBottom: 20 }}>
              {items.map(item => (
                <div key={item.icon} style={{ background: 'white', padding: '16px', borderRadius: 14, border: '1px solid #E5E7EB', display: 'flex', alignItems: 'flex-start', gap: 12, boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                  <div style={{ padding: 8, background: item.bg, borderRadius: '50%', flexShrink: 0 }}>
                    <span className="material-icons-outlined" style={{ color: item.color, fontSize: 20 }}>{item.icon}</span>
                  </div>
                  <p style={{ fontSize: 13, color: '#374151', lineHeight: 1.7 }}>{item.text}</p>
                </div>
              ))}
            </div>
            <div style={{ background: '#0B9B88', borderRadius: 14, padding: '20px 24px', textAlign: 'center' }}>
              <p style={{ fontWeight: 700, fontSize: 17, color: 'white' }}>その選択肢の一つとして、とらべがあります。</p>
              <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.8)', marginTop: 6 }}>学校に感じる「なんとなくの違和感」の正体が、ここに来ると言語化できるかもしれません。</p>
            </div>
          </div>
        </section>
      );
    };

    // ── App ───────────────────────────────────────────────────────────
    const App = () => {
      const [activeSection, setActiveSection] = useState('top');

      const scrollTo = useCallback((id) => {
        const el = document.getElementById(id);
        if (el) {
          const offset = 72;
          const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      }, []);

      // Track active section via IntersectionObserver
      useEffect(() => {
        const ids = ['top','concept','features','schedule','staff','cta'];
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
        }, { threshold: 0.3 });
        ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      return (
        <div>
          <Header onNav={scrollTo} activeSection={activeSection} />
          <div style={{ paddingTop: 0 }}>
            <Hero onNav={scrollTo} />
            <Concept />
            <Empathy onNav={scrollTo} />
            <Features onNav={scrollTo} />
            <Schedule />
            <Staff />
            <CTASection />
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
