<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; padding: 20px; }
  .row { display: flex; align-items: baseline; gap: 12px; padding: 7px 0; border-bottom: 1px solid #F3F4F6; }
  .row:last-child { border: none; }
  .meta { width: 80px; flex-shrink: 0; font-size: 10px; color: #9CA3AF; font-family: monospace; }
  .sample { color: #333; flex: 1; line-height: 1.3; }
</style>
</head>
<body>
  <div class="row"><div class="meta">7xl · 900</div><div class="sample" style="font-size:48px;font-weight:900">歩止歩止</div></div>
  <div class="row"><div class="meta">4xl · 700</div><div class="sample" style="font-size:32px;font-weight:700">とらすとベース フリースクール</div></div>
  <div class="row"><div class="meta">3xl · 700</div><div class="sample" style="font-size:28px;font-weight:700">子どもたちの可能性を信じる</div></div>
  <div class="row"><div class="meta">2xl · 700</div><div class="sample" style="font-size:22px;font-weight:700">「歩いてもいい、止まってもいい」</div></div>
  <div class="row"><div class="meta">xl · 700</div><div class="sample" style="font-size:18px;font-weight:700">まずは見学に来てみてください</div></div>
  <div class="row"><div class="meta">base · 400</div><div class="sample" style="font-size:15px;font-weight:400">一人ひとりの興味関心や特性に合わせた学びを実現します。</div></div>
  <div class="row"><div class="meta">sm · 400</div><div class="sample" style="font-size:13px;font-weight:400;color:#6B7280">東京都中野区 ／ アットホームな一軒家 ／ 個別対応（少人数）</div></div>
  <div class="row"><div class="meta">xs · 700</div><div class="sample" style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0B9B88">Concept</div></div>
</body></html>
