<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F9FAFB; padding: 20px; }
  .block { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #F3F4F6; }
  .label-tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #0B9B88; margin-bottom: 6px; }
  .display-kanji { font-size: 52px; font-weight: 900; color: #333; letter-spacing: 0.05em; line-height: 1.1; }
  .subtitle { font-size: 14px; font-weight: 700; color: #555; margin-top: 4px; }
  .body-text { font-size: 13px; line-height: 1.7; color: #6B7280; }
  .quote { border-left: 3px solid rgba(11,155,136,0.4); padding-left: 10px; font-size: 12px; font-style: italic; color: #0a7c6d; line-height: 1.6; }
</style>
</head>
<body>
  <div class="block">
    <div class="label-tag">Display — 歩止歩止</div>
    <div class="display-kanji">歩 止 歩 止</div>
    <div class="subtitle">「歩いてもいい、止まってもいい」</div>
  </div>
  <div class="block">
    <div class="label-tag">Body Copy</div>
    <div class="body-text">子どもたち一人ひとりが自分軸を更新しながら、自分自身という貴重な資源を最大限活かし、自らが成果を上げるための学びを大切にします。</div>
  </div>
  <div class="block">
    <div class="label-tag">Quote / Blockquote</div>
    <div class="quote">「どんな状態で来てくれても、まず『よく来てくれたね』と伝えたい。ここが、あなたの安心できる場所になりますように。」</div>
  </div>
</body></html>
